name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Render
        uses: renderhq/action-deploy@v1
        with:
          render-service-token: ${{ secrets.RENDER_API_TOKEN }}
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
