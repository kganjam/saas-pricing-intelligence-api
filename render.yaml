services:
  - type: web
    name: saas-pricing-api
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: "5000"
    plan: free
    autoDeploy: true
